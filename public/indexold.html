<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pictures in the Park — The Park Tavern, Macclesfield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="sprockets"></div>
<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <h1><span>Pictures</span><span>in the Park</span></h1>
      <p class="tag">Free film screenings · The Park Tavern, Macclesfield</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-small" id="curatorAddFilmBtn" style="display:none;">＋ Add film</button>
      <a class="btn btn-ghost" id="loginBtn" href="#loginOverlay">🔒 Curator</a>
    </div>
  </div>
</header>
<div class="sprockets"></div>

<div class="tabs-wrap">
  <nav class="tabs" id="tabs" aria-label="Filter by category"></nav>
</div>

<main>
  <div class="category-strap" id="categoryStrap" style="display:none;"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  We regularly screen free films in our boutique cinema upstairs — get your ticket(s) at the bar on the night.
  <br>
  <a href="https://park-tavern.co.uk/cinema/" target="_blank" rel="noopener">park-tavern.co.uk/cinema</a>
</footer>

<!-- Detail lightbox -->
<div class="overlay" id="detailOverlay">
  <div class="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="detailClose" aria-label="Close">✕</button>
    <div class="detail-layout" id="detailContent"></div>
  </div>
</div>

<!-- Login lightbox -->
<div class="overlay" id="loginOverlay">
  <div class="lightbox lightbox-small" role="dialog" aria-modal="true">
    <a class="lightbox-close" id="loginClose" href="#!" aria-label="Close">✕</a>
    <div class="lightbox-inner">
      <div class="container" id="auth-container">
        <h2>Curator login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <hr>
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
      </div>
    </div>
  </div>
</div>

<!-- Category manager lightbox -->
<div class="overlay" id="categoryOverlay">
  <div class="lightbox lightbox-small" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="categoryClose" aria-label="Close">✕</button>
    <div class="lightbox-inner">
      <h2>Manage categories</h2>
      <div id="categoryList"></div>
      <div class="form-actions" style="justify-content:flex-start; margin-top:18px;">
        <button class="btn btn-teal btn-small" id="addCategoryBtn">＋ Add category</button>
      </div>
    </div>
  </div>
</div>

<!-- Category edit lightbox -->
<div class="overlay" id="categoryEditOverlay">
  <div class="lightbox lightbox-small" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="categoryEditClose" aria-label="Close">✕</button>
    <div class="lightbox-inner">
       <div class="container" id="auth-container">
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <hr>
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
      </div>
    </div>
  </div>
</div>

<!-- Film edit lightbox -->
<div class="overlay" id="filmOverlay">
  <div class="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="filmClose" aria-label="Close">✕</button>
    <div class="lightbox-inner">
      <h2 id="filmEditTitle">Add film</h2>
      <form id="filmEditForm">
        <div class="field-row">
          <div class="field" style="flex:2 1 260px;">
            <label for="filmTitle">Title</label>
            <input type="text" id="filmTitle" required placeholder="e.g. On Falling, or [Sci-Fi Drama] to keep it secret">
          </div>
          <div class="field">
            <label for="filmCategory">Category</label>
            <select id="filmCategory" required></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="filmDate">Date</label>
            <input type="date" id="filmDate" required>
          </div>
          <div class="field">
            <label for="filmCert">Certificate</label>
            <select id="filmCert">
              <option>U</option><option>PG</option><option>12</option><option selected>15</option><option>18</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label for="filmGenre">Genre</label><input type="text" id="filmGenre" placeholder="e.g. Drama"></div>
          <div class="field"><label for="filmRuntime">Runtime</label><input type="text" id="filmRuntime" placeholder="e.g. 1 hr 44 mins"></div>
        </div>
        <div class="field-row">
          <div class="field"><label for="filmCountry">Country</label><input type="text" id="filmCountry" placeholder="e.g. Portugal"></div>
          <div class="field"><label for="filmYear">Year</label><input type="text" id="filmYear" placeholder="e.g. 2024"></div>
        </div>
        <div class="field">
          <label for="filmImage">Poster image URL (optional — leave blank to use a generated poster)</label>
          <input type="url" id="filmImage" placeholder="https://...">
          <div class="img-preview" id="filmImagePreview"></div>
        </div>
        <div class="field">
          <label for="filmHint">"You may like it if you like…" hint (optional, for secret screenings)</label>
          <input type="text" id="filmHint" placeholder="e.g. You may like it if you like: Flow">
        </div>
        <div class="field">
          <label for="filmSynopsis">Synopsis</label>
          <textarea id="filmSynopsis" required></textarea>
        </div>
        <p class="form-error" id="filmEditError"></p>
        <div class="form-actions">
          <button type="button" class="btn btn-crimson btn-small" id="filmDeleteBtn" style="display:none;">Delete film</button>
          <span style="flex:1 1 auto;"></span>
          <button type="button" class="btn btn-small" id="filmCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-teal btn-small">Save film</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="assets/js/script.js" defer></script>
<!-- To use your own login instead of the built-in demo password, add your
     script here AFTER app.js, e.g.: <script src="auth.js" defer></script>
     It can call window.filmClubAuth.logIn() / .logOut() — see the bottom
     of app.js for details. -->
</body>
</html>
