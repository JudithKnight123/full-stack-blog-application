<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pictures in the Park — The Park Tavern, Macclesfield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="sprockets"></div>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <h1><span>Pictures</span><span>in the Park</span></h1>
      <p class="tag">Free film screenings · The Park Tavern, Macclesfield</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost lightbox-trigger hidden" id="curatorAddFilmBtn" data-target="filmOverlay" onclick="startNewFilm()">＋ Add film</button>
      <!-- <button class="btn btn-ghost btn-small lightbox-trigger hidden" id="curatorAddFilmBtn" data-target="filmOverlay" onclick="createPost()">＋ Add film</button> -->
      <button class="btn btn-ghost lightbox-trigger" id="loginBtn" data-target="loginOverlay">Curator</button>
      <button class="btn btn-ghost hidden" onclick="logout()" id="logoutBtn">Logout</button>
      
    </div>
  </div>
</header>
<div class="sprockets"></div>

<div class="tabs-wrap">
  <nav class="tabs" id="tabs" aria-label="Filter by category">
    <button class="tab active" onclick="showAllFilms(this);">All screenings</button>
    <button class="manage-link lightbox-trigger hidden" data-target="categoryOverlay" id="manageCategoriesBtn">Manage categories</button></nav>
</div>

<main>
  <div class="category-strap" id="categoryStrap" style="display:none;"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  We regularly screen free films in our boutique cinema upstairs — get your ticket(s) at the bar on the night.
  <br>
  <a href="https://park-tavern.co.uk/cinema/" target="_blank" rel="noopener">park-tavern.co.uk/cinema</a>
</footer>

<!-- Detail lightbox -->
 <div class="lightbox-overlay" id="detailOverlay">
  <div class="lightbox-box">
    <button class="lightbox-close" id="detailClose" data-target="detailOverlay" aria-label="Close">✕</button>
      <div class="detail-layout" id="detailContent"></div>
  </div>
</div>

<!-- Login lightbox -->
 <div class="lightbox-overlay" id="loginOverlay">
  <div class="lightbox-box lightbox-box-small">
    <button class="lightbox-close" data-target="loginOverlay" aria-label="Close">✕</button>
    
      <div id="auth-container">
      <h2>Register</h2>
      <form id="registerForm" onsubmit="register(event)">
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button type="submit">Register</button>
      </form>

      <hr>

      <h2>Login</h2>
      <form id="loginForm" onsubmit="login(event)">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button type="submit">Login</button>
      </form>
    </div>
   
  </div>
</div>



<!-- Category manager lightbox -->
 <div class="lightbox-overlay" id="categoryOverlay">
  <div class="lightbox-box lightbox-box-small">
    <button class="lightbox-close" id="categoryClose" data-target="categoryOverlay" aria-label="Close">✕</button>
    <div class="lightbox-inner">
      <h2>Manage categories</h2>
      <div id="categoryList"></div>
      <div class="form-actions" style="justify-content:flex-start; margin-top:18px;">
        <button class="btn btn-teal btn-small lightbox-trigger" data-target="categoryEditOverlay" id="addCategoryBtn" onclick="startNewCategory()">＋ Add category</button>
      </div>
    </div>
  </div>
</div>

<!-- Category edit lightbox -->
 <div class="lightbox-overlay" id="categoryEditOverlay">
  <div class="lightbox-box lightbox-box-small">
    <button class="lightbox-close" id="categoryEditClose" data-target="categoryEditOverlay" aria-label="Close">✕</button>
    <div class="lightbox-inner">
      <h2 id="categoryEditTitle">Add category</h2>
      <form id="categoryEditForm">
        <div class="field">
          <label for="catName">Name</label>
          <input type="text" id="catName" required>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="catColor">Colour</label>
            <input type="color" id="catColor" value="#6e8f5c">
          </div>
          <div class="field">
            <label for="catSchedule">Schedule</label>
            <input type="text" id="catSchedule" placeholder="e.g. Thursdays · 8pm">
          </div>
        </div>
        <div class="field">
          <label for="catProgrammer">Programmed by</label>
          <input type="text" id="catProgrammer" placeholder="e.g. Paul">
        </div>
        <div class="field">
          <label for="catDescription">Description</label>
          <textarea id="catDescription"></textarea>
        </div>
        <p class="form-error" id="categoryEditError"></p>
        <div class="form-actions">
          <button type="button" class="btn btn-crimson btn-small" id="catDeleteBtn" style="display:none;" onclick="deleteCategory()">Delete category</button>
          <button type="button" class="btn btn-small lightbox-cancel" id="catCancelBtn" data-target="categoryEditOverlay">Cancel</button>
          <button type="button" class="btn btn-teal btn-small" onclick="createCategory()">Save category</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Film edit lightbox -->
 <div class="lightbox-overlay" id="filmOverlay">
  <div class="lightbox-box">
    <button class="lightbox-close" id="filmClose" data-target="filmOverlay" aria-label="Close">✕</button>
    <div class="lightbox-inner">

      <h2 id="filmEditTitle">Add film</h2>
      <form id="filmEditForm">
        <div class="field-row">
          <div class="field" style="flex:2 1 260px;">
            <label for="filmTitle">Title</label>
            <input type="text" id="filmTitle" required placeholder="e.g. On Falling, or [Sci-Fi Drama] to keep it secret">
          </div>
          <div class="field">
            <label for="filmCategory">Category</label>
            <select id="filmCategory" required></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="filmDate">Date</label>
            <input type="date" id="filmDate" required="">
          </div>
          <div class="field">
            <label for="filmCert">Certificate</label>
            <select id="filmCert">
              <option>U</option><option>PG</option><option>12</option><option selected="">15</option><option>18</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label for="filmGenre">Genre</label><input type="text" id="filmGenre" placeholder="e.g. Drama"></div>
          <div class="field"><label for="filmRuntime">Runtime</label><input type="text" id="filmRuntime" placeholder="e.g. 1 hr 44 mins"></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="filmYear">Year</label>
            <input type="text" id="filmYear" placeholder="e.g. 2024">
          </div>
        <div class="field">
          <label for="filmHint">"You may like it if you like…" (optional)</label>
          <input type="text" id="filmHint" placeholder="e.g. You may like it if you like: Flow">
        </div>
        </div>
        <div class="field">
          <label for="filmImage">Poster image URL (optional — leave blank to use a generated poster)</label>
          <input type="url" id="filmImage" placeholder="https://...">
          <div class="img-preview" id="filmImagePreview"></div>
        </div>
        <div class="field">
          <label for="filmSynopsis">Synopsis</label>
          <textarea id="filmSynopsis" required></textarea>
        </div>
        <p class="form-error" id="filmEditError"></p>
        <div class="form-actions">
          <button type="button" class="btn btn-crimson btn-small lightbox-cancel hidden" id="filmDeleteBtn" onclick="deleteFilm()" data-target="filmOverlay">Delete film</button>          
          <button type="button" class="btn btn-small lightbox-cancel" id="filmCancelBtn" data-target="filmOverlay">Cancel</button>
          <button type="button" class="btn btn-teal btn-small" onclick="createPost()" data-target="filmOverlay">Save film</button>
        </div>
      </form>
    </div>
  </div>
</div>


<script src="assets/js/script.js"></script>
</body>
</html>
